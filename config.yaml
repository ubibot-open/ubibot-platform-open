server:
  http_port: 8080
  mqtt_port: 1883

database:
  path: ./data/ubibot.db

telemetry:
  batch_size: 100
  flush_interval: 2s
  retention_days: 30

homeassistant:
  enabled: false
  broker: tcp://127.0.0.1:1883
  username: ""
  password: ""
  discovery_prefix: homeassistant
  client_id: ubibot-platform

log:
  level: info
